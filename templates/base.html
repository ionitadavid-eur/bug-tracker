<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
        nav { background: #2c3e50; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 15px; }
        nav a:hover { color: #3498db; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h1, h2 { margin-bottom: 20px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2c3e50; color: white; }
        tr:hover { background: #f0f0f0; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn:hover { opacity: 0.85; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-open { background: #e74c3c; color: white; }
        .badge-progress { background: #f39c12; color: white; }
        .badge-fixed { background: #2ecc71; color: white; }
        .badge-high { background: #e74c3c; color: white; }
        .badge-medium { background: #f39c12; color: white; }
        .badge-low { background: #95a5a6; color: white; }
        form { background: white; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        .filters { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        .filters select { width: auto; }
        .detail-card { background: white; padding: 30px; border-radius: 8px; }
        .detail-row { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .detail-row label { font-weight: bold; color: #666; font-size: 13px; }
        .detail-row p { margin-top: 5px; font-size: 15px; }
    </style>
</head>
<body>
    <nav>
        <span style="color:white; font-weight:bold; font-size:18px;">🐛 Bug Tracker</span>
        <div>
            <a href="/">All Bugs</a>
            <a href="/add">Report Bug</a>
            <a href="/archive">Archived</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
